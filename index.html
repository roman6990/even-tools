<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control Local</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --hover: #334155;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 600px;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            text-align: center;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 12px;
        }
        a {
            background: var(--card);
            color: var(--text);
            text-decoration: none;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }
        a:hover {
            background: var(--hover);
            border-color: var(--primary);
            transform: translateY(-2px);
        }
        .icon {
            margin-right: 12px;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

        <a href="ot.html"><span class="icon">⚙️</span> OT Script</a>
        <a href="permisos.html"><span class="icon">🔑</span> Permisos</a>
        <a href="boxReport.html"><span class="icon">📦</span> Box Report</a>
        <a href="horas.html"><span class="icon">🕒</span> Horas</a>
        <a href="ReporteTelegram.html"><span class="icon">📜</span> Reporte Telegram</a>

    </div>
</div>

</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Reporte Eventelecom v2.8</title>
    <style>
        :root {
            --primary-color: #007bff;
            --secondary-color: #28a745;
            --danger-color: #dc3545;
            --bg-color: #f4f4f9;
            --text-color: #333;
            --border-radius: 8px;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 20px; 
            background-color: var(--bg-color); 
            color: var(--text-color);
        }

        .container { 
            max-width: 700px; 
            margin: auto; 
            background: #fff; 
            padding: 30px; 
            border-radius: var(--border-radius); 
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); 
            position: relative; 
        }

        .logo-container {
            position: absolute;
            top: 30px;
            right: 30px;
        }
        .logo-container img {
            max-height: 50px;
            width: auto;
        }

        h1 { 
            font-size: 24px; 
            margin-bottom: 30px; 
            color: #222;
            border-left: 5px solid var(--primary-color);
            padding-left: 15px;
        }

        h2 { 
            font-size: 17px; 
            border-bottom: 2px solid #edf2f7; 
            padding-bottom: 8px; 
            margin-top: 35px; 
            color: #4a5568;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        label { 
            display: block; 
            margin-top: 18px; 
            font-weight: 600; 
            font-size: 14px;
            color: #4a5568;
        }

        input[type="text"], 
        input[type="number"], 
        input[type="date"], 
        select, 
        textarea {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            box-sizing: border-box;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 15px;
            transition: all 0.2s ease-in-out;
            background-color: #fff;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.15);
        }

        .controls { 
            margin-top: 35px; 
            display: flex; 
            gap: 10px; 
            flex-wrap: wrap;
        }

        .controls button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            transition: all 0.2s;
            min-width: 150px;
        }

        #generateBtn { background-color: var(--primary-color); color: white; }
        #generateBtn:hover { background-color: #0062cc; }

        #copyBtn { background-color: var(--secondary-color); color: white; }
        #copyBtn:hover { background-color: #218838; }
        #copyBtn:disabled { background-color: #a0aec0; cursor: not-allowed; }

        #resetBtn { background-color: #6c757d; color: white; }
        #resetBtn:hover { background-color: #5a6268; }

        #reportOutput {
            width: 100%;
            min-height: 280px;
            margin-top: 20px;
            padding: 20px;
            border: 2px solid #e2e8f0;
            border-radius: var(--border-radius);
            background-color: #f8fafc;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            color: #2d3748;
        }

        @media (max-width: 650px) {
            .logo-container { position: static; text-align: center; margin-bottom: 20px; }
            .controls { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="https://images.squarespace-cdn.com/content/v1/6581c2f2ed9bfb1cf6328bee/3bb68561-9357-44ea-9c84-34b509a49059/logos_eventelecom_color.png" alt="Logo Eventelecom">
    </div>

    <h1>Generador de Reporte</h1>
    
    <form id="ticketForm">
        
        <h2>Información General</h2>
        <label for="ticket_id">Número de Ticket:</label>
        <input type="text" id="ticket_id" placeholder="Ej: 12345" required>
        
        <label for="inicio">Fecha de Inicio:</label>
        <input type="date" id="inicio" required>
        
        <label for="ciudad">Ciudad:</label>
        <input type="text" id="ciudad" required value="MTY">
        
        <label for="tipo_danio">Tipo de Daño:</label>
        <input type="text" id="tipo_danio">

        <label for="ubicacion_danio">Ubicación del Daño:</label>
        <input type="text" id="ubicacion_danio">

        <h2>Material Utilizado</h2>
        <label for="calibre_fibra">Calibre de Fibra:</label>
        <select id="calibre_fibra">
            <option value="48" selected>48 hilos (Predeterminado)</option>
            <option value="12">12 hilos</option>
            <option value="24">24 hilos</option>
            <option value="96">96 hilos</option>
        </select>
        
        <label for="material_fibra_optica">Fibra Óptica (metros):</label>
        <input type="text" id="material_fibra_optica">

        <label for="material_cajas_empalmes">Cajas de empalmes (cant):</label>
        <input type="number" id="material_cajas_empalmes">

        <label for="material_preformados">Preformados (cant):</label>
        <input type="number" id="material_preformados">
        
        <label for="material_herrajes_tension">Herrajes de tensión (cant):</label>
        <input type="number" id="material_herrajes_tension">
        
        <label for="material_herrajes_suspension">Herrajes de suspensión (cant):</label>
        <input type="number" id="material_herrajes_suspension">

        <label for="material_etiquetas">Etiquetas (cant):</label>
        <input type="number" id="material_etiquetas">

        <label for="material_herraje_tangente">Herraje tangente (cant):</label>
        <input type="number" id="material_herraje_tangente">
        
        <label for="material_neopreno">Neopreno (cant):</label>
        <input type="number" id="material_neopreno">

        <label for="material_brazo_extension">Brazo de extensión y tipo:</label>
        <input type="text" id="material_brazo_extension">

        <h2>Actividades Realizadas</h2>
        <label for="act_jalado_instalacion">Jalado / Instalación (detalle y mts):</label>
        <input type="text" id="act_jalado_instalacion">

        <label for="act_desinstalacion_fibra">Desinstalación de fibra (mts):</label>
        <input type="number" id="act_desinstalacion_fibra">

        <label for="act_empalmes">Empalmes (cantidad):</label>
        <input type="number" id="act_empalmes">
        
        <label for="act_mantenimiento_ce">Mantenimiento a CE (cant):</label>
        <input type="number" id="act_mantenimiento_ce">
        
        <label for="act_solo_baja_caja">Solo baja de caja (cant):</label>
        <input type="number" id="act_solo_baja_caja">

        <label for="act_loops_raqueta">Loops / Raqueta (cant):</label>
        <input type="number" id="act_loops_raqueta">

        <label for="act_medicion_power_meter">Medición Power Meter (cant):</label>
        <input type="number" id="act_medicion_power_meter">

        <label for="act_medicion_otdr">Medición OTDR (cant):</label>
        <input type="number" id="act_medicion_otdr">

        <label for="act_mantenimiento_raqueta">Mantenimiento Raqueta (cant):</label>
        <input type="number" id="act_mantenimiento_raqueta">

        <label for="act_corte_longitudinal">Corte longitudinal (cant):</label>
        <input type="number" id="act_corte_longitudinal">

        <label for="act_horas_resguardo">Horas de Resguardo:</label>
        <input type="number" id="act_horas_resguardo">

        <label for="act_disparo_cuadrilla">Disparo de Cuadrilla:</label>
        <input type="number" id="act_disparo_cuadrilla" value="1">

        <h2>Cierre de Reporte</h2>
        <label for="atiende">Atiende (Personal):</label>
        <input type="text" id="atiende" placeholder="Nombres del personal" required>

        <label for="notas">Notas / Observaciones:</label>
        <textarea id="notas" placeholder="Detalles adicionales..."></textarea>

        <div class="controls">
            <button type="button" id="generateBtn" onclick="generateReport()">Generar Reporte</button>
            <button type="button" id="copyBtn" onclick="copyReport()" disabled>Copiar Rápido</button>
            <button type="button" id="resetBtn" onclick="resetForm()">Limpiar Formulario</button>
        </div>
    </form>
    
    <label style="margin-top: 30px; display: block; font-weight: bold;">Reporte Generado:</label>
    <textarea id="reportOutput" readonly></textarea>
</div>

<script>
    // Configuración de fecha por defecto
    document.addEventListener('DOMContentLoaded', () => {
        setTodayDate();
    });

    function setTodayDate() {
        const today = new Date();
        document.getElementById('inicio').value = today.toISOString().split('T')[0];
    }

    const getVal = (id) => document.getElementById(id).value.trim();

    function formatField(id, prefix, calibreText = '') {
        const value = getVal(id);
        const element = document.getElementById(id);
        
        if (value === '' || (element.type === 'number' && value === '0')) {
            return '';
        }
        
        let finalValue = value;
        const withCalibre = ['material_fibra_optica', 'material_preformados', 'act_jalado_instalacion', 'act_desinstalacion_fibra'];
        
        if (withCalibre.includes(id) && calibreText) {
            finalValue += ` ${calibreText}`;
        }
        return `${prefix}${finalValue}\n`;
    }

    function generateReport() {
        const calibreText = `de F.O. de ${getVal('calibre_fibra')} hilos`;
        let report = `REPORTE DE TICKET: ${getVal('ticket_id')}\n\n`;
        
        report += `* Inicio: ${getVal('inicio').split('-').reverse().join('-')}\n`;
        report += `* Ciudad: ${getVal('ciudad')}\n`;
        if (getVal('tipo_danio')) report += `Tipo de daño: ${getVal('tipo_danio')}\n`;
        if (getVal('ubicacion_danio')) report += `Ubicación de daño: ${getVal('ubicacion_danio')}\n\n`;

        // Materiales
        let mat = '';
        mat += formatField('material_fibra_optica', '#Fibra Optica: ', calibreText);
        mat += formatField('material_cajas_empalmes', '#Cajas de empalmes: ');
        mat += formatField('material_preformados', '#Preformados: ', calibreText);
        mat += formatField('material_herrajes_tension', '#Herrajes de tensión: ');
        mat += formatField('material_herrajes_suspension', '#Herrajes de suspensión: ');
        mat += formatField('material_etiquetas', '#Etiquetas: ');
        mat += formatField('material_herraje_tangente', '#Herraje tangente: ');
        mat += formatField('material_neopreno', '#Neopreno: ');
        mat += formatField('material_brazo_extension', '#Brazo de extensión y tipo: ');
        if (mat) report += `Material\n${mat}\n`;

        // Actividades
        let act = '';
        act += formatField('act_jalado_instalacion', '#jalado/instalación: ', calibreText);
        act += formatField('act_desinstalacion_fibra', '#desinstalacion de fibra: ', calibreText);
        act += formatField('act_empalmes', '#empalmes: ');
        act += formatField('act_mantenimiento_ce', '#mantenimiento a ce: ');
        act += formatField('act_solo_baja_caja', '#solo baja de caja: ');
        act += formatField('act_loops_raqueta', '#loops/raqueta: ');
        act += formatField('act_medicion_power_meter', '#medición power meter: ');
        act += formatField('act_medicion_otdr', '#medición OTDR: ');
        act += formatField('act_mantenimiento_raqueta', '#Mantenimiento raqueta: ');
        act += formatField('act_corte_longitudinal', '#corte longitudinal: ');
        act += formatField('act_horas_resguardo', '#horas de resguardo: ');
        act += formatField('act_disparo_cuadrilla', '#disparo de cuadrilla: ');
        if (act) report += `Actividades realizadas\n${act}\n`;

        if (getVal('atiende')) report += `Atiende: ${getVal('atiende')}\n`;
        if (getVal('notas')) report += `\nNotas:\n${getVal('notas')}`;

        document.getElementById('reportOutput').value = report.trim();
        document.getElementById('copyBtn').disabled = false;
    }

    function copyReport() {
        const output = document.getElementById('reportOutput');
        navigator.clipboard.writeText(output.value).then(() => {
            const btn = document.getElementById('copyBtn');
            const originalText = btn.textContent;
            btn.textContent = '¡Copiado con éxito!';
            setTimeout(() => { btn.textContent = originalText; }, 2000);
        });
    }

    function resetForm() {
        if (confirm('¿Estás seguro de que deseas limpiar todo el formulario? Esta acción no se puede deshacer.')) {
            document.getElementById('ticketForm').reset();
            document.getElementById('reportOutput').value = '';
            document.getElementById('copyBtn').disabled = true;
            setTodayDate();
            window.scrollTo(0, 0); // Regresa al inicio de la página
        }
    }
</script>

</body>
</html>
